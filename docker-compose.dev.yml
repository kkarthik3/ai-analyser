version: "3.9"

# Dev overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug
    environment:
      - APP_DEBUG=true
      - APP_LOG_LEVEL=DEBUG

  frontend:
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
